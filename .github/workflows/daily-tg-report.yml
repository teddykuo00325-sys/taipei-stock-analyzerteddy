name: Daily Telegram Report (08:30 Taipei)

# 主要靠 cron-job.org 在 08:30 (台北) 觸發 workflow_dispatch（準時 ±1 分鐘）
# GH 內建 cron 嚴重延遲（4-6 小時），只設一個當 fallback；
# concurrency 保證同時只有一個 run，避免重複推送
on:
  schedule:
    - cron: '30 1 * * *'      # 01:30 UTC = 09:30 台北（fallback only）
  workflow_dispatch:           # cron-job.org 跟手動觸發都走這

# 同名 workflow 同時最多一個 run；後到的會被取消
concurrency:
  group: daily-tg-report
  cancel-in-progress: false   # 已在跑的不打斷，新到的直接 skip

permissions:
  contents: read
  actions: read                # 為了 dedupe 查 runs API

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py
