name: Daily Telegram Report (08:30 Taipei)

# GitHub Actions cron 嚴重延遲問題（可能 4-6 小時），所以排多個時點搶
# 同時靠 send_daily_report 內部「今日已發送」去重，只會 TG 一次。
# 排程點（UTC = +8 後是台北）：
#   00:30 UTC = 08:30  ← 主要排程，最理想時間
#   00:45 UTC = 08:45  ← +15min backup
#   01:00 UTC = 09:00  ← +30min backup
#   01:30 UTC = 09:30  ← 最終 fallback
on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '45 0 * * *'
    - cron: '0 1 * * *'
    - cron: '30 1 * * *'
  workflow_dispatch:        # 允許手動 trigger 測試

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # 跑完整選股約 3-5 分鐘
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 讓 marketdata / industry / universe 用 yfinance / TWSE 抓即時資料
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py
