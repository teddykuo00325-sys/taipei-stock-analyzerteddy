name: Daily Telegram Report (08:30 Taipei)

# Cron 用 UTC：00:30 UTC = 08:30 Asia/Taipei (UTC+8)
# 週一~週五（台股交易日）；要週末也跑改成 '*'
on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:        # 允許手動 trigger 測試

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # 跑完整選股約 3-5 分鐘
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 讓 marketdata / industry / universe 用 yfinance / TWSE 抓即時資料
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py
