name: Daily Telegram Report (08:30 Taipei)

# 唯一觸發來源：cron-job.org 在 08:30 (台北) 透過 GitHub API workflow_dispatch
# GH 內建 schedule 嚴重延遲 4-6 小時，已移除避免重複推送
# 重複推送防護：scripts/send_daily_report.py _check_gh_runs_today() 查今日 runs
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read                # 為了 dedupe 查 runs API

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 給予緩衝；正常雲端模式（skip yfinance）<10 分鐘
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py
