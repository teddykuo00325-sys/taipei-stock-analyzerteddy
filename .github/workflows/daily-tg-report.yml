name: Daily Telegram Report (08:30 Taipei)

# 唯一觸發來源：cron-job.org 在 08:30 (台北) 透過 GitHub API workflow_dispatch
# GH 內建 schedule 嚴重延遲 4-6 小時，已移除避免重複推送
# 重複推送防護：scripts/send_daily_report.py _check_gh_runs_today() 查今日 runs
on:
  workflow_dispatch:
    inputs:
      force:
        description: '強制推送（略過今日已推送 dedup）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write             # ★ write 才能 commit realbacktest.db track record 資料
  actions: read                # 為了 dedupe 查 runs API

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 雲端機器慢時 screener.screen 可能 25-40 分鐘
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false
          # ★ fetch-depth: 0 避免 push 時被 GH 拒絕（shallow clone 推不上去）
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ★ 私人收件人 — Track Record + 資金配置只推到此 chat（不送 channel）
          TELEGRAM_CHAT_ID_PRIVATE: ${{ secrets.TELEGRAM_CHAT_ID_PRIVATE }}
          # 手動 dispatch 時可指定 force=true 略過今日已推送檢查
          FORCE_SEND: ${{ github.event.inputs.force == 'true' && '1' || '' }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py

      # ★ TG 推送後，把 realbacktest.db 變動 commit 回 repo
      # 這樣明天 GH Actions checkout 就能看到今天 auto-lock 的 sessions
      # 5 日後到期才能 auto_close_expired + 累積 Track Record
      - name: Commit realbacktest.db (TG track record snapshot)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 只加實際存在的 DB — 5 個持久化 DB 都 commit 回 repo
          # 缺 etf.db 曾導致 ETF holdings 抓到新資料但沒 commit → 下次 checkout
          # 又是舊資料 → 「主動式 ETF 進出沒更新」bug (07-16 用戶回報)
          for db in \
              data/realbacktest.db \
              data/disposal_history.db \
              data/etf.db \
              data/shareholders.db \
              data/industry.db; do
            if [ -f "$db" ]; then
              git add "$db"
            fi
          done
          if git diff --staged --quiet; then
            echo "DB 無變動，跳過 commit"
            exit 0
          fi
          git commit -m "auto(snapshot): realbacktest+disposal $(TZ=Asia/Taipei date +%Y-%m-%d)"
          # ★ Push with rebase retry — 處理並行 workflow / 手動 commit 衝突
          # 最多 5 次重試，每次 fetch + rebase + push
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✅ push 成功 (attempt $i)"
              exit 0
            fi
            echo "⚠️ push 失敗 (attempt $i)，rebase 重試"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep 2
          done
          echo "❌ push 5 次都失敗，放棄"
          exit 1
