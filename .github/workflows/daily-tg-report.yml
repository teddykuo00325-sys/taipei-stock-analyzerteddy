name: Daily Telegram Report (08:30 Taipei)

# 唯一觸發來源：cron-job.org 在 08:30 (台北) 透過 GitHub API workflow_dispatch
# GH 內建 schedule 嚴重延遲 4-6 小時，已移除避免重複推送
# 重複推送防護：scripts/send_daily_report.py _check_gh_runs_today() 查今日 runs
on:
  workflow_dispatch:

permissions:
  contents: write             # ★ write 才能 commit realbacktest.db track record 資料
  actions: read                # 為了 dedupe 查 runs API

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 給予緩衝；正常雲端模式（skip yfinance）<10 分鐘
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false
          # ★ fetch-depth: 0 避免 push 時被 GH 拒絕（shallow clone 推不上去）
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report sender
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ★ 私人收件人 — Track Record + 資金配置只推到此 chat（不送 channel）
          TELEGRAM_CHAT_ID_PRIVATE: ${{ secrets.TELEGRAM_CHAT_ID_PRIVATE }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/send_daily_report.py

      # ★ TG 推送後，把 realbacktest.db 變動 commit 回 repo
      # 這樣明天 GH Actions checkout 就能看到今天 auto-lock 的 sessions
      # 5 日後到期才能 auto_close_expired + 累積 Track Record
      - name: Commit realbacktest.db (TG track record snapshot)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/realbacktest.db
          if git diff --staged --quiet; then
            echo "realbacktest.db 無變動，跳過 commit"
          else
            git commit -m "auto(tg-track): realbacktest snapshot $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
